<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Things To Do in Burlington, VT — Burlington Brief</title>
  <meta name="description" content="A local's guide to everything worth doing in and around Burlington, Vermont — breweries, beaches, trails, museums, live music, and more.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- SITE HEADER -->
  <header class="site-header" id="site-header">
    <div class="header-inner">
      <a href="#" class="logo" onclick="return false;" aria-label="Burlington Things To Do">
        <span class="logo-btv">BTV</span>
        <span class="logo-sep"></span>
        <span class="logo-title">Things To Do</span>
      </a>

      <nav class="mode-nav" aria-label="View mode">
        <button class="mode-btn" id="btn-list" data-mode="list" aria-pressed="true">The List</button>
        <button class="mode-btn" id="btn-guides" data-mode="guides" aria-pressed="false">Guides</button>
      </nav>

      <button class="dark-toggle" id="dark-toggle" aria-label="Toggle dark mode">
        <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
        <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- ================================================
       LIST MODE
  ================================================= -->
  <div id="mode-list" class="mode-panel">

    <!-- Events Strip -->
    <div class="events-strip" id="events-strip" hidden>
      <div class="events-strip-inner">
        <span class="events-label">This Week</span>
        <div class="events-scroll" id="events-list" role="list"></div>
      </div>
    </div>

    <!-- List Layout -->
    <div class="list-layout">

      <!-- Filter Sidebar -->
      <div class="filter-overlay" id="filter-overlay" aria-hidden="true"></div>
      <aside class="filter-panel" id="filter-panel" aria-label="Filters">
        <div class="filter-panel-header">
          <span class="filter-panel-title">Filter</span>
          <button class="filter-close-btn" id="filter-close" aria-label="Close filters">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
        <div class="filter-sections" id="filter-sections">
          <!-- Rendered by app.js -->
        </div>
        <div class="filter-panel-footer">
          <button class="btn-clear-all" id="clear-all-filters">Clear all filters</button>
        </div>
      </aside>

      <!-- Main List Content -->
      <main class="list-main" id="list-main">

        <!-- Toolbar: Search + Filter Toggle + Sort -->
        <div class="toolbar">
          <div class="search-wrap">
            <svg class="search-icon" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
            </svg>
            <input
              type="search"
              id="search-input"
              class="search-input"
              placeholder="Search places, vibes, neighborhoods…"
              autocomplete="off"
              spellcheck="false"
            >
            <button class="search-clear" id="search-clear" aria-label="Clear search" hidden>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
                <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
              </svg>
            </button>
          </div>

          <div class="toolbar-right">
            <button class="filter-toggle-btn" id="filter-toggle" aria-label="Toggle filters" aria-expanded="false">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/>
              </svg>
              <span>Filter</span>
              <span class="active-filter-count" id="active-filter-count" hidden>0</span>
            </button>

            <select class="sort-select" id="sort-select" aria-label="Sort results">
              <option value="featured">Featured</option>
              <option value="alpha">A–Z</option>
              <option value="neighborhood">By neighborhood</option>
            </select>
          </div>
        </div>

        <!-- Quick Filters -->
        <div class="quick-filters">
          <label class="quick-chip">
            <input type="checkbox" id="free-only">
            <span>Free only</span>
          </label>
          <label class="quick-chip">
            <input type="checkbox" id="has-guide">
            <span>Has guide</span>
          </label>
          <button class="surprise-btn" id="surprise-btn" type="button">
            ✦ Surprise me
          </button>
        </div>

        <!-- Result Count -->
        <p class="result-count" id="result-count" aria-live="polite" aria-atomic="true"></p>

        <!-- Cards Grid -->
        <div class="cards-grid" id="cards-grid" role="list"></div>

        <!-- Empty State -->
        <div class="empty-state" id="empty-state" hidden role="status">
          <div class="empty-icon">◎</div>
          <p class="empty-heading">No matches found</p>
          <p class="empty-sub">Try fewer filters or clear the search.</p>
          <button class="btn-outline" id="empty-clear-btn">Clear all filters</button>
        </div>

        <!-- Loading State -->
        <div class="loading-state" id="loading-state" role="status">
          <p>Loading…</p>
        </div>

      </main>
    </div>
  </div>

  <!-- ================================================
       GUIDES MODE
  ================================================= -->
  <div id="mode-guides" class="mode-panel" hidden>
    <div id="guides-view" class="guides-view">
      <!-- Rendered by guides.js -->
    </div>
  </div>

  <!-- ================================================
       DETAIL DRAWER
  ================================================= -->
  <div class="detail-overlay" id="detail-overlay" aria-hidden="true"></div>
  <div class="detail-drawer" id="detail-drawer" role="dialog" aria-modal="true" aria-label="Place details" hidden>
    <div class="detail-drawer-inner">
      <div class="detail-drawer-header">
        <button class="detail-close-btn" id="detail-close" aria-label="Close">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div class="detail-content" id="detail-content">
        <!-- Rendered by app.js -->
      </div>
    </div>
  </div>

  <footer class="site-footer">
    <div class="footer-inner">
      <span>A <a href="https://www.btownbrief.com" target="_blank" rel="noopener">Burlington Brief</a> project</span>
      <span class="footer-sep">·</span>
      <span>Burlington, Vermont</span>
    </div>
  </footer>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV/XN/WPuE=" crossorigin=""></script>
  <script src="js/app.js"></script>
  <script src="js/guides.js"></script>
</body>
</html>
