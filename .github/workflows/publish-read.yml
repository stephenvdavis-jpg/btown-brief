name: Publish morning read by 9 AM

# Safety net for the "My Read" weather blurb. The 9:40 UTC draft run
# (refresh-weather.yml) queues a draft; Stephen can approve or edit it any
# morning with scripts/approve_read.py. If he hasn't by ~8:50 AM Burlington
# time, this publishes the draft as-is so the site never shows a stale read.
#
# Two crons because GitHub cron is UTC and Vermont flips EDT/EST. The script
# is idempotent, so the extra off-season run is a harmless no-op.

on:
  schedule:
    - cron: '50 12 * * *'   # 8:50 AM EDT (summer)
    - cron: '50 13 * * *'   # 8:50 AM EST (winter; 9:50 in summer, no-op then)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-weather
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Publish the draft if still unapproved
        run: python3 scripts/auto_publish_read.py

      - name: Commit if changed
        run: |
          git config user.name "btown-brief-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/weather/
          if git diff --cached --quiet; then
            echo "Nothing to publish."
          else
            git commit -m "Auto-publish morning read"
            git push || (git pull --rebase && git push)
          fi
