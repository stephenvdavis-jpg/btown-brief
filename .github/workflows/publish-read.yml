name: Publish morning read by 7 AM

# Safety net for the "My Read" weather blurb. The 9:40 UTC draft run
# (refresh-weather.yml) queues a draft; Stephen can approve or edit it any
# morning with scripts/approve_read.py. If he hasn't by ~6:35 AM Burlington
# time (5:35 in winter), this publishes the draft as-is so readers always
# have a same-day read by 7 AM. The midday and evening updates publish from
# refresh-weather.yml directly.

on:
  schedule:
    - cron: '35 10 * * *'   # 6:35 AM EDT / 5:35 AM EST — live before 7 year-round
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-weather
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Publish the draft if still unapproved
        run: python3 scripts/auto_publish_read.py

      - name: Commit if changed
        run: |
          git config user.name "btown-brief-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/weather/
          if git diff --cached --quiet; then
            echo "Nothing to publish."
          else
            git commit -m "Auto-publish morning read"
            git push || (git pull --rebase && git push)
          fi
