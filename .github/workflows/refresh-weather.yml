name: Refresh weather data

# Keeps data/weather/latest.json fresh for the Burlington Right Now page,
# and drafts the "My Read" report three times a day so the page carries a
# fresh read by 7 AM, noon, and 5 PM Burlington time. The morning draft
# queues for optional review (publish-read.yml is its safety net); the
# midday and evening updates publish straight away.
# Same contract as refresh-data.yml: the site stays 100% static, failed
# fetches keep the last good data, and nothing broken is ever committed.

on:
  schedule:
    - cron: '45 * * * *'        # hourly at :45 (offset from refresh-data at :15)
    - cron: '40 9 * * *'        # 5:40 AM EDT / 4:40 EST — morning draft window
    - cron: '30 15 * * *'       # 11:30 AM EDT / 10:30 EST — midday update
    - cron: '30 20 * * *'       # 4:30 PM EDT / 3:30 EST — evening update
  workflow_dispatch:

permissions:
  contents: write

# The 9:40 draft run can overlap the :45 hourly run — queue them instead.
concurrency:
  group: refresh-weather
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Refresh weather data
        run: python3 scripts/refresh_weather.py

      - name: Draft the read
        # Morning (9:40 UTC) queues for optional review — publish-read.yml
        # promotes it in time for 7 AM. Midday and evening draft here and
        # publish in the next step. A manual dispatch drafts the morning
        # edition.
        if: github.event.schedule == '40 9 * * *' || github.event.schedule == '30 15 * * *' || github.event.schedule == '30 20 * * *' || github.event_name == 'workflow_dispatch'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          case "${{ github.event.schedule }}" in
            '30 15 * * *') EDITION=midday ;;
            '30 20 * * *') EDITION=evening ;;
            *) EDITION=morning ;;
          esac
          python3 scripts/draft_read.py --edition "$EDITION"

      - name: Publish the midday/evening update
        if: github.event.schedule == '30 15 * * *' || github.event.schedule == '30 20 * * *'
        run: python3 scripts/auto_publish_read.py

      - name: Commit if changed
        run: |
          git config user.name "btown-brief-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/weather/
          if git diff --cached --quiet; then
            echo "No weather changes."
          else
            git commit -m "Auto-refresh weather data"
            git push || (git pull --rebase && git push)
          fi
