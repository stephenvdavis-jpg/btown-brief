name: Refresh Burlington Pulse

# Rebuilds the neighborhood-chatter data for chatter.html a few times a day:
#   scripts/refresh_chatter.py -> data/chatter.json (+ data/chatter-seen.json history)
# Sources: r/burlington + r/vermont via the Inoreader public streams (primary)
# and Reddit's JSON listings when reachable. On any failure the last good
# files are kept — the page never goes blank.
# NOTE: tips-inbox writing is a local-only feature and is skipped in CI
# (the script detects GITHUB_ACTIONS); data/tips-inbox.md is gitignored.
# Optional: set the ANTHROPIC_API_KEY repo secret to enable the LLM pass
# that polishes topic labels and highlight picks (same pattern as the
# weather read drafts); without it the deterministic heuristics run alone.

on:
  schedule:
    # 4x daily, Vermont-shaped: ~6:40 / 10:40 / 14:40 / 18:40 ET (EDT)
    - cron: '40 10,14,18,22 * * *'
  workflow_dispatch:

permissions:
  contents: write

# A manual run and a scheduled run racing at `git push` would fail one of them.
concurrency:
  group: refresh-chatter
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Guard private paths (never tracked in this public repo)
        run: |
          if git ls-files | grep -E '^(data/tips-inbox\.md|data/fpf-digests/|data/fpf-dropbox/|\.chatter-dev/)'; then
            echo "::error::private tip-line files are tracked in git — aborting"
            exit 1
          fi

      - name: Refresh chatter data
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 scripts/refresh_chatter.py

      - name: Commit if changed
        run: |
          git config user.name "btown-brief-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/chatter.json data/chatter-seen.json
          if git diff --cached --quiet; then
            echo "No chatter changes."
          else
            git commit -m "Auto-refresh Burlington Pulse data"
            git push
          fi
