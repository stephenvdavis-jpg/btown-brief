name: Deploy static site to GitHub Pages

# Publishes the repo root as-is (no Jekyll, no build step) using the
# modern GitHub Actions Pages pipeline.
#
# Triggers:
#  - push to main (human commits / PR merges)
#  - after the hourly "Refresh community data" run, because commits it makes
#    with the built-in GITHUB_TOKEN do NOT trigger `push` events. Without
#    this, auto-refreshed data (newsletter, events, reddit) never deploys.

on:
  push:
    branches: ["main"]
  workflow_run:
    workflows: ["Refresh community data"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
